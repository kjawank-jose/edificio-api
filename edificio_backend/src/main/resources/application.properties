spring.application.name=edificio_backend

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/edificio_db
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=${JWT_SECRET:desarrollo_clave_por_defecto_123456789012345678901234567890}
app.jwt.expiration=86400000

# Puerto
server.port=8080